metadata:
  factory_name: "N-CMAPSS telemetry factory"                    
  version: "0.1.0"                                                                                            
  owner: "Stan_Buren"                                         
  description: >
    N-CMAPSS MLOps Factory. A uv monorepo (3 isolated pkgs) with 1-click orchestrators for cloud training 
    & Redpanda/Streamlit live inference. Trains a Bayesian VI (Flipout) model for RUL with uncertainty 
    quantification. Built with Zero-Trust, SafeTensors & Sigstore to align with EU AI Act & DORA guidelines 
    for high-risk AI systems.

